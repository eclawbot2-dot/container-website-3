<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Container">
  <rect width="64" height="64" rx="12" fill="#04090c"/>
  <!-- stacked shipping containers -->
  <rect x="12" y="34" width="40" height="9" rx="1.5" fill="#10474f"/>
  <rect x="12" y="44" width="40" height="9" rx="1.5" fill="#0a2b30"/>
  <rect x="16" y="24" width="32" height="9" rx="1.5" fill="#ff8a3d"/>
  <!-- corrugation hint -->
  <g stroke="#04090c" stroke-width="1" opacity="0.5">
    <line x1="22" y1="24" x2="22" y2="33"/>
    <line x1="30" y1="24" x2="30" y2="33"/>
    <line x1="38" y1="24" x2="38" y2="33"/>
  </g>
</svg>
